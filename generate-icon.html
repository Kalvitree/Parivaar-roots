<!DOCTYPE html>
<html>
<head><title>Roots Icon Generator</title></head>
<body style="font-family:sans-serif;padding:24px;background:#f5f5f0;">
<h2>Roots Icon Generator</h2>
<p>Right-click each icon below → <strong>Save image as</strong> → save with the filename shown.</p>

<div style="display:flex;gap:24px;flex-wrap:wrap;margin-top:16px;">
  <div>
    <p style="margin-bottom:8px;font-size:13px;color:#666;">Save as: <code>icon-192.png</code> → put in <code>public/icons/</code></p>
    <canvas id="c192" width="192" height="192" style="border-radius:42px;display:block;"></canvas>
  </div>
  <div>
    <p style="margin-bottom:8px;font-size:13px;color:#666;">Save as: <code>icon-512.png</code> → put in <code>public/icons/</code></p>
    <canvas id="c512" width="512" height="512" style="border-radius:112px;display:block;"></canvas>
  </div>
</div>

<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.22;

  // Background
  ctx.fillStyle = '#1D9E75';
  ctx.beginPath();
  ctx.roundRect(0, 0, size, size, r);
  ctx.fill();

  // Leaf emoji
  ctx.font = `${size * 0.55}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🌿', size / 2, size / 2 + size * 0.03);
}

drawIcon(document.getElementById('c192'), 192);
drawIcon(document.getElementById('c512'), 512);
</script>
</body>
</html>
